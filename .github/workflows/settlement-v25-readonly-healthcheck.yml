name: V25.1.3 Read-only Supabase Healthcheck

on:
  push:
    branches:
      - dev/v25.1.3-settlement-pipeline
    paths:
      - .github/workflows/settlement-v25-readonly-healthcheck.yml

permissions:
  contents: read

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_ENABLED: "true"
      DATABASE_SHADOW_MODE: "true"
      DATABASE_FAIL_OPEN: "true"
      DATABASE_BACKEND: "supabase_rest"
      DATABASE_TIMEOUT_SECONDS: "20"
      DATABASE_MAX_RETRIES: "2"
      DATABASE_BATCH_SIZE: "250"

      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout settlement branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Confirm safe configuration
        shell: bash
        run: |
          test "$DATABASE_ENABLED" = "true"
          test "$DATABASE_SHADOW_MODE" = "true"
          test "$DATABASE_FAIL_OPEN" = "true"
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SECRET_KEY"
          echo "Read-only healthcheck configuration confirmed."

      - name: Run read-only Supabase healthcheck
        run: |
          python -m football_agent.scripts.run_settlement \
            --mode healthcheck \
            --limit 1

      - name: Show healthcheck report
        if: always()
        shell: bash
        run: |
          if [[ -f output/settlement_healthcheck.json ]]; then
            cat output/settlement_healthcheck.json
          else
            echo "Healthcheck report was not created."
          fi

      - name: Upload healthcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v25-settlement-readonly-healthcheck
          path: output/settlement_healthcheck.json
          if-no-files-found: warn
          retention-days: 7
