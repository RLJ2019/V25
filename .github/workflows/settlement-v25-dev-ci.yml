name: V25.1.3 Settlement Dev CI

on:
  push:
    branches:
      - dev/v25.1.3-settlement-pipeline
      - dev/v25.1.3-settlement-pipeline-clean

concurrency:
  group: v25-settlement-dev-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_ENABLED: "false"
      DATABASE_SHADOW_MODE: "true"
      SUPABASE_URL: ""
      SUPABASE_SECRET_KEY: ""
      API_FOOTBALL_KEY: ""
      FOOTBALL_DATA_API_KEY: ""
      GEMINI_API_KEY: ""
      TELEGRAM_ENABLED: "false"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout settlement branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile settlement code
        run: python -m compileall football_agent -q

      - name: Run smoke test
        run: python smoke_test.py

      - name: Run complete test suite
        run: python -m unittest discover -s tests -v

      - name: Confirm database isolation
        run: |
          test "$DATABASE_ENABLED" = "false"
          test -z "$SUPABASE_URL"
          test -z "$SUPABASE_SECRET_KEY"
          echo "Database isolation confirmed."
