name: V25 Line-up Monitor

on:
  schedule:
    - cron: "*/30 9-23 * * *"
  workflow_dispatch:

concurrency:
  group: v25-football-agent-state
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lineup-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}

      TELEGRAM_ENABLED: ${{ vars.TELEGRAM_ENABLED || 'false' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      LIVE_SHEET_URL: ${{ vars.LIVE_SHEET_URL || '' }}
      GOOGLE_SHEET_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEET_WEBHOOK_URL }}

      DATABASE_ENABLED: ${{ vars.DATABASE_ENABLED || 'false' }}
      DATABASE_SHADOW_MODE: ${{ vars.DATABASE_SHADOW_MODE || 'true' }}
      DATABASE_FAIL_OPEN: ${{ vars.DATABASE_FAIL_OPEN || 'true' }}
      DATABASE_BACKEND: "supabase_rest"
      DATABASE_TIMEOUT_SECONDS: ${{ vars.DATABASE_TIMEOUT_SECONDS || '20' }}
      DATABASE_MAX_RETRIES: ${{ vars.DATABASE_MAX_RETRIES || '2' }}
      DATABASE_BATCH_SIZE: ${{ vars.DATABASE_BATCH_SIZE || '250' }}
      SHADOW_COMPARE_SINCE_UTC: ${{ vars.SHADOW_COMPARE_SINCE_UTC || '' }}
      SHADOW_COMPARE_FAIL_CLOSED: ${{ vars.SHADOW_COMPARE_FAIL_CLOSED || 'true' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

      AGENT_RUN_TYPE: "lineup_monitor"
      LOCAL_OUTPUT_DIR: "output"
      REQUIRE_FINAL_LINEUP_FOR_VALUE_PICK: "true"
      MAX_ODDS_AGE_MINUTES: "90"
      SEND_DAILY_REPORT: "false"
      SEND_VALUE_ALERTS: "true"
      SEND_HEARTBEAT: "false"
      ONLY_WATCHLIST_LINEUP_MONITOR: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore shared output cache
        uses: actions/cache@v4
        with:
          path: output/
          key: v25-output-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            v25-output-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run line-up monitor
        run: |
          python -m football_agent.scripts.run_lineup_monitor

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v25-lineup-monitor-output
          path: output/
          if-no-files-found: ignore
          retention-days: 14
