name: V25.1.3 Settlement Pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "settlement mode: healthcheck, dry_run, settle"
        required: true
        default: "dry_run"
      limit:
        description: "max unsettled VALUE_PICK rows to inspect"
        required: false
        default: "1000"

concurrency:
  group: v25-settlement-pipeline
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  settlement:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      DATABASE_ENABLED: ${{ vars.DATABASE_ENABLED || 'false' }}
      DATABASE_SHADOW_MODE: ${{ vars.DATABASE_SHADOW_MODE || 'true' }}
      DATABASE_FAIL_OPEN: ${{ vars.DATABASE_FAIL_OPEN || 'true' }}
      DATABASE_BACKEND: "supabase_rest"
      DATABASE_TIMEOUT_SECONDS: ${{ vars.DATABASE_TIMEOUT_SECONDS || '20' }}
      DATABASE_MAX_RETRIES: ${{ vars.DATABASE_MAX_RETRIES || '2' }}
      DATABASE_BATCH_SIZE: ${{ vars.DATABASE_BATCH_SIZE || '250' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

      SETTLEMENT_LIMIT: ${{ github.event.inputs.limit || '1000' }}
      POSTPONED_VOID_AFTER_HOURS: ${{ vars.POSTPONED_VOID_AFTER_HOURS || '36' }}
      SUPPORTED_TOTAL_LINES_MODE: "WHOLE_AND_HALF_ONLY"
      CLV_ALLOW_BENCHMARK_FALLBACK: ${{ vars.CLV_ALLOW_BENCHMARK_FALLBACK || 'true' }}
      CLV_BENCHMARK_BOOKMAKER_PRIORITY: ${{ vars.CLV_BENCHMARK_BOOKMAKER_PRIORITY || 'pinnacle,Pinnacle' }}
      CLV_ALLOW_CONSENSUS_FALLBACK: ${{ vars.CLV_ALLOW_CONSENSUS_FALLBACK || 'true' }}
      CLV_MIN_COMPLETE_BOOKMAKERS_FOR_CONSENSUS: ${{ vars.CLV_MIN_COMPLETE_BOOKMAKERS_FOR_CONSENSUS || '2' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests without database writes
        env:
          DATABASE_ENABLED: "false"
          SUPABASE_URL: ""
          SUPABASE_SECRET_KEY: ""
        run: |
          python -m compileall football_agent -q
          python smoke_test.py
          python -m unittest discover -s tests

      - name: Show settlement configuration
        shell: bash
        run: |
          echo "MODE=${{ github.event.inputs.mode }}"
          echo "SETTLEMENT_LIMIT=$SETTLEMENT_LIMIT"
          echo "DATABASE_ENABLED=$DATABASE_ENABLED"
          echo "DATABASE_SHADOW_MODE=$DATABASE_SHADOW_MODE"
          echo "POSTPONED_VOID_AFTER_HOURS=$POSTPONED_VOID_AFTER_HOURS"
          echo "CLV_BENCHMARK_BOOKMAKER_PRIORITY=$CLV_BENCHMARK_BOOKMAKER_PRIORITY"
          if [[ -n "$SUPABASE_URL" && -n "$SUPABASE_SECRET_KEY" ]]; then
            echo "DATABASE_CONFIGURED=true"
          else
            echo "DATABASE_CONFIGURED=false"
          fi

      - name: Run settlement pipeline
        run: |
          python -m football_agent.scripts.run_settlement --mode "${{ github.event.inputs.mode }}" --limit "$SETTLEMENT_LIMIT"

      - name: Upload settlement artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v25-settlement-output
          path: output/
          if-no-files-found: ignore
          retention-days: 14
