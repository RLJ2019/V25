name: Weekly V25 Candidate Recalibration

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: v25-football-agent-state
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  recalibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      LOCAL_OUTPUT_DIR: "output"
      TRAINING_LOG: "output/prediction_log.csv"
      CANDIDATE_WEIGHTS_OUTPUT: "output/candidate_learned_model_weights.json"
      WEIGHT_TRAINING_REPORT: "output/weight_training_report.json"
      MIN_TRAINING_ROWS: "100"
      PROMOTE_WEIGHTS: "false"

      DATABASE_ENABLED: ${{ vars.DATABASE_ENABLED || 'false' }}
      DATABASE_SHADOW_MODE: ${{ vars.DATABASE_SHADOW_MODE || 'true' }}
      DATABASE_FAIL_OPEN: ${{ vars.DATABASE_FAIL_OPEN || 'true' }}
      DATABASE_BACKEND: "supabase_rest"
      DATABASE_TIMEOUT_SECONDS: ${{ vars.DATABASE_TIMEOUT_SECONDS || '20' }}
      DATABASE_MAX_RETRIES: ${{ vars.DATABASE_MAX_RETRIES || '2' }}
      DATABASE_BATCH_SIZE: ${{ vars.DATABASE_BATCH_SIZE || '250' }}
      SHADOW_COMPARE_SINCE_UTC: ${{ vars.SHADOW_COMPARE_SINCE_UTC || '' }}
      SHADOW_COMPARE_FAIL_CLOSED: ${{ vars.SHADOW_COMPARE_FAIL_CLOSED || 'true' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore shared output cache
        uses: actions/cache@v4
        with:
          path: output/
          key: v25-output-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            v25-output-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tests
        run: |
          python -m compileall football_agent -q
          python smoke_test.py
          python -m unittest discover -s tests

      - name: Generate candidate weights
        run: |
          python -m football_agent.scripts.run_weight_training

      - name: Shadow parity report
        run: |
          python -m football_agent.scripts.compare_shadow_state

      - name: Upload recalibration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v25-candidate-recalibration
          path: output/
          if-no-files-found: ignore
          retention-days: 30
