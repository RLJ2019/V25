name: V25.1.3 CLV Bundle Diagnostic

on:
  push:
    branches:
      - dev/v25.1.3-settlement-pipeline
    paths:
      - .github/workflows/settlement-v25-clv-bundle-diagnostic.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_ENABLED: "true"
      DATABASE_SHADOW_MODE: "true"
      DATABASE_FAIL_OPEN: "false"
      DATABASE_BACKEND: "supabase_rest"
      DATABASE_TIMEOUT_SECONDS: "20"
      DATABASE_MAX_RETRIES: "2"
      DATABASE_BATCH_SIZE: "250"

      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout settlement branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Read CLV odds bundle
        shell: bash
        run: |
          python - <<'PY'
          import json
          from decimal import Decimal
          from pathlib import Path

          from football_agent.database.connection import (
              DatabaseSettings,
              SupabaseRestClient,
          )
          from football_agent.database.repository import DatabaseRepository
          from football_agent.settlement.clv import calculate_clv

          settings = DatabaseSettings.from_env()
          client = SupabaseRestClient(settings)
          repository = DatabaseRepository(client)

          rows = repository.fetch_closing_odds_bundle(
              fixture_id="af-1554386",
              market="BTTS",
              selection="BTTS_YES",
              line=None,
              limit=1000,
          )

          allowed_fields = (
              "fixture_id",
              "bookmaker",
              "market",
              "selection",
              "line",
              "odds",
              "snapshot_key",
              "snapshot_timestamp_utc",
              "captured_at_utc",
              "created_at",
              "updated_at",
          )

          diagnostic_rows = [
              {
                  key: row.get(key)
                  for key in allowed_fields
                  if key in row
              }
              for row in rows
          ]

          diagnostic_rows.sort(
              key=lambda row: (
                  str(row.get("bookmaker") or ""),
                  str(row.get("snapshot_timestamp_utc") or ""),
                  str(row.get("selection") or ""),
              )
          )

          clv = calculate_clv(
              entry_odds=Decimal("11.0"),
              model_probability=Decimal("0.49924207"),
              market="BTTS",
              selection="BTTS_YES",
              closing_bookmaker="marathonbet",
              quotes=rows,
              kickoff_utc="2026-07-15T19:00:00+00:00",
          )

          payload = {
              "mode": "read_only_clv_diagnostic",
              "fixture_id": "af-1554386",
              "kickoff_utc": "2026-07-15T19:00:00+00:00",
              "requested_market": "BTTS",
              "requested_selection": "BTTS_YES",
              "requested_bookmaker": "marathonbet",
              "row_count": len(rows),
              "rows": diagnostic_rows,
              "recomputed_clv": vars(clv),
          }

          Path("output").mkdir(exist_ok=True)
          output_path = Path("output/clv_bundle_diagnostic.json")
          output_path.write_text(
              json.dumps(payload, indent=2, default=str),
              encoding="utf-8",
          )

          print(f"Read-only rows retrieved: {len(rows)}")
          print(f"Artifact written: {output_path}")
          print(
              json.dumps(
                  payload["recomputed_clv"],
                  indent=2,
                  default=str,
              )
          )
          PY

      - name: Upload diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v25-clv-bundle-diagnostic
          path: output/clv_bundle_diagnostic.json
          if-no-files-found: error
          retention-days: 7
